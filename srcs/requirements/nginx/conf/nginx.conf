# nombre maximal de connexions simultanées
events {
	worker_connections 1024;
}

http {
	# permet de reconnaitre les extensions (HTML, CSS, etc...)
	include /etc/nginx/mime.types;

	server
	{
		# SSL/TLS Configuration
		listen 443;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_certificate /etc/nginx/ssl/nginx.crt
		ssl_certificate_key /etc/nginx/ssl/nginx.key

		root /var/www/html
		server_name ${DOMAIN_NAME};
		index index.php index.html;

		# requete inconnu = 404 error
		location / {
			try_file $uri $uri/ =404;
		}

		# Pour toutes les requetes php
		# renvoyer les requetes php sur le port 9000
		location ~ \.php$ {
			include snippets/fastcgi-php.conf;
			fastcgi_pass wordpress:9000;
		}
	}
}
